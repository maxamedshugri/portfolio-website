<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Maxamed Portfolio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Segoe UI",sans-serif;
  background:radial-gradient(circle at top,#3a0b5e,#0b0014);
  color:#fff;
  min-height:100vh;
  padding:30px 20px 60px;
}
.wrap{max-width:1000px;margin:auto}
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
  flex-wrap:wrap;
  gap:15px;
}
h1{font-size:26px}
h1 span{color:#d86cff}
.logout{
  background:none;
  border:1px solid #d86cff;
  color:#fff;
  padding:8px 18px;
  border-radius:20px;
  cursor:pointer;
  font-size:13px;
}
.logout:hover{background:#d86cff}
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  margin-bottom:30px;
}
.stat-card{
  background:rgba(255,255,255,.05);
  border-radius:14px;
  padding:20px;
  text-align:center;
}
.stat-card .num{font-size:28px;color:#d86cff;font-weight:bold}
.stat-card .label{font-size:13px;opacity:.7;margin-top:5px}
table{
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,.05);
  border-radius:14px;
  overflow:hidden;
}
th,td{
  padding:14px 16px;
  text-align:left;
  font-size:14px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
th{opacity:.7;font-weight:600}
tr:last-child td{border-bottom:none}
.badge{
  padding:3px 10px;
  border-radius:12px;
  font-size:11px;
}
.badge.new{background:#d86cff;color:#fff}
.badge.read{background:rgba(255,255,255,.1);color:#aaa}
.actions button{
  background:none;
  border:1px solid rgba(255,255,255,.2);
  color:#fff;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
  margin-right:6px;
}
.actions button:hover{border-color:#d86cff;color:#d86cff}
#loadingMsg,#emptyMsg,#errorMsg{
  text-align:center;
  padding:40px;
  opacity:.7;
}
#errorMsg{display:none;color:#ff6b6b}
#emptyMsg{display:none}
</style>
</head>
<body>
 
<div class="wrap">
  <header>
    <h1>Admin <span>Dashboard</span></h1>
    <div style="display:flex;gap:10px">
      <button class="logout" id="settingsBtn">⚙ Settings</button>
      <button class="logout" id="logoutBtn">Log Out</button>
    </div>
  </header>

  <div id="settingsPanel" style="display:none;background:rgba(255,255,255,.05);border-radius:14px;padding:20px;margin-bottom:30px">
    <h3 style="margin-bottom:15px;color:#d86cff">Change Username / Password</h3>
    <form id="settingsForm" style="display:grid;gap:12px;max-width:400px">
      <label style="font-size:13px;opacity:.8">Current Password</label>
      <input type="password" id="currentPassword" required style="padding:10px;background:#111;border:1px solid #333;color:#fff;border-radius:8px">

      <label style="font-size:13px;opacity:.8">New Username (optional)</label>
      <input type="text" id="newUsername" placeholder="Leave blank to keep current" style="padding:10px;background:#111;border:1px solid #333;color:#fff;border-radius:8px">

      <label style="font-size:13px;opacity:.8">New Password (optional)</label>
      <input type="password" id="newPassword" placeholder="Leave blank to keep current" style="padding:10px;background:#111;border:1px solid #333;color:#fff;border-radius:8px">

      <button type="submit" style="padding:12px;border:none;border-radius:30px;background:linear-gradient(90deg,#c44bff,#ff4fd8);color:#fff;cursor:pointer">Save Changes</button>
      <p id="settingsStatus" style="text-align:center;font-size:13px;min-height:16px"></p>
    </form>
  </div>
 
  <div class="stats">
    <div class="stat-card">
      <div class="num" id="totalCount">-</div>
      <div class="label">Total Messages</div>
    </div>
    <div class="stat-card">
      <div class="num" id="unreadCount">-</div>
      <div class="label">Unread</div>
    </div>
  </div>
 
  <div id="loadingMsg">Loading messages...</div>
  <div id="errorMsg">Could not load messages. Please log in again or check the backend server.</div>
  <div id="emptyMsg">No contact messages yet.</div>
 
  <table id="msgTable" style="display:none">
    <thead>
      <tr>
        <th>Status</th>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="msgBody"></tbody>
  </table>
</div>
 
<script>
const API_BASE_URL = "https://portfolio-api-6lzk.onrender.com/api";
const token = localStorage.getItem("token");
 
if(!token){
  window.location.href = "login.html";
}
 
async function loadMessages(){
  const loading = document.getElementById("loadingMsg");
  const errorMsg = document.getElementById("errorMsg");
  const emptyMsg = document.getElementById("emptyMsg");
  const table = document.getElementById("msgTable");
  const body = document.getElementById("msgBody");
 
  try{
    const res = await fetch(`${API_BASE_URL}/contact`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
 
    if(res.status === 401){
      localStorage.removeItem("token");
      window.location.href = "login.html";
      return;
    }
 
    if(!res.ok) throw new Error("Failed to load");
 
    const messages = await res.json();
    loading.style.display = "none";
 
    document.getElementById("totalCount").textContent = messages.length;
    document.getElementById("unreadCount").textContent = messages.filter(m=>!m.isRead).length;
 
    if(messages.length === 0){
      emptyMsg.style.display = "block";
      return;
    }
 
    table.style.display = "table";
    body.innerHTML = messages.map(m => `
      <tr>
        <td><span class="badge ${m.isRead ? 'read' : 'new'}">${m.isRead ? 'Read' : 'New'}</span></td>
        <td>${escapeHtml(m.name)}</td>
        <td>${escapeHtml(m.email)}</td>
        <td>${escapeHtml(m.message)}</td>
        <td>${new Date(m.createdAt).toLocaleString()}</td>
        <td class="actions">
          ${!m.isRead ? `<button onclick="markRead(${m.id})">Mark Read</button>` : ""}
          <button onclick="deleteMsg(${m.id})">Delete</button>
        </td>
      </tr>
    `).join("");
 
  } catch(err){
    loading.style.display = "none";
    errorMsg.style.display = "block";
  }
}
 
function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
 
async function markRead(id){
  await fetch(`${API_BASE_URL}/contact/${id}/read`, {
    method: "PUT",
    headers: { "Authorization": `Bearer ${token}` }
  });
  loadMessages();
}
 
async function deleteMsg(id){
  if(!confirm("Delete this message?")) return;
  await fetch(`${API_BASE_URL}/contact/${id}`, {
    method: "DELETE",
    headers: { "Authorization": `Bearer ${token}` }
  });
  loadMessages();
}
 
document.getElementById("logoutBtn").addEventListener("click", ()=>{
  localStorage.removeItem("token");
  window.location.href = "login.html";
});

const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");
const settingsForm = document.getElementById("settingsForm");
const settingsStatus = document.getElementById("settingsStatus");

settingsBtn.addEventListener("click", ()=>{
  settingsPanel.style.display = settingsPanel.style.display === "none" ? "block" : "none";
});

settingsForm.addEventListener("submit", async (e)=>{
  e.preventDefault();
  const currentPassword = document.getElementById("currentPassword").value;
  const newUsername = document.getElementById("newUsername").value.trim();
  const newPassword = document.getElementById("newPassword").value;

  settingsStatus.textContent = "Saving...";
  settingsStatus.style.color = "#d86cff";

  try{
    const res = await fetch(`${API_BASE_URL}/auth/update-credentials`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${localStorage.getItem("token")}`
      },
      body: JSON.stringify({
        currentPassword,
        newUsername: newUsername || null,
        newPassword: newPassword || null
      })
    });

    const data = await res.json();

    if(res.ok){
      if(data.token) localStorage.setItem("token", data.token);
      settingsStatus.textContent = "Updated successfully!";
      settingsStatus.style.color = "#4caf50";
      settingsForm.reset();
    } else {
      settingsStatus.textContent = data.message || "Could not update.";
      settingsStatus.style.color = "#ff6b6b";
    }
  } catch(err){
    settingsStatus.textContent = "Could not reach the server.";
    settingsStatus.style.color = "#ff6b6b";
  }
});
 
loadMessages();
</script>
 
</body>
</html>
